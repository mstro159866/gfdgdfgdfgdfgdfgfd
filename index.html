<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 RX SMP | Live Control Panel 🔮</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #06030c;
            --card-bg: rgba(15, 10, 28, 0.7);
            --border: rgba(157, 78, 221, 0.22);
            --text-color: #ffffff;
            --text-muted: #a39eb4;
            --primary: #9d4edd;
            --primary-glow: rgba(157, 78, 221, 0.4);
            --accent: #c77dff;
            --danger: #ff007f;
            --success: #00f5d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 50% 50%, rgba(157, 78, 221, 0.12) 0%, transparent 60%); }

        /* نافذة تسجيل الدخول */
        .login-container { background: var(--card-bg); border: 1px solid var(--border); padding: 3rem 2.5rem; border-radius: 32px; width: 100%; max-width: 450px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; }
        .login-container h2 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-container p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .input-group { position: relative; margin-bottom: 1.5rem; text-align: right; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: bold; }
        .input-group input { width: 100%; padding: 1rem 1.2rem; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; color: #fff; font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .btn-login { width: 100%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 1rem; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px var(--primary-glow); margin-top: 1rem; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--primary-glow); }

        /* لوحة التحكم */
        .panel-container { display: none; width: 100%; max-width: 1000px; padding: 2rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .panel-header h2 { font-size: 1.8rem; font-weight: 900; }
        .btn-logout { background: rgba(255,0,127,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.5rem 1.2rem; border-radius: 12px; cursor: pointer; font-weight: bold;}
        .btn-logout:hover { background: var(--danger); color: white; }
        .panel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
        .control-card { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; }
        .control-card h3 { font-size: 1.3rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; color: var(--accent); }
        select, .control-card input { width: 100%; padding: 0.9rem 1rem; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 0.95rem; outline: none; margin-bottom: 1rem; font-family: inherit; }
        select option { background: #0c0817; color: #fff; }
        .btn-action { width: 100%; padding: 0.9rem; border: none; border-radius: 14px; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ff007f, #ff5252); color: white; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .console-box { grid-column: span 2; background: #020105; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; font-family: 'Plus Jakarta Sans', monospace; min-height: 120px; max-height: 200px; overflow-y: auto; text-align: left; direction: ltr; }
        .console-line { margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--success); }
        .console-line.cmd { color: var(--text-muted); }
        @media (max-width: 768px) { .panel-grid { grid-template-columns: 1fr; } .console-box { grid-column: span 1; } }
    </style>
</head>
<body>

    <!-- نافذة تسجيل الدخول للوحة -->
    <div class="login-container" id="loginBox">
        <h2>تسجيل دخول الإدارة</h2>
        <p>الرجاء إدخال البيانات للوصول إلى لوحة تحكم السيرفر</p>
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="panel">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="checkLogin()">دخول اللوحة <i class="fa-solid fa-sign-in"></i></button>
    </div>

    <!-- لوحة التحكم الكاملة -->
    <div class="panel-container" id="panelBox">
        <div class="panel-header">
            <h2><i class="fa-solid fa-gears" style="color: var(--primary);"></i> لوحة تحكم RX SMP (Live)</h2>
            <button class="btn-logout" onclick="logout()">تسجيل الخروج <i class="fa-solid fa-sign-out"></i></button>
        </div>

        <div class="panel-grid">
            <!-- إدارة الرتب -->
            <div class="control-card">
                <h3><i class="fa-solid fa-crown"></i> نظام إدارة الرتب</h3>
                <input type="text" id="rankPlayer" placeholder="اسم اللاعب داخل اللعبة">
                <select id="rankSelect">
                    <option value="vip">رتبة VIP</option>
                    <option value="mvp">رتبة MVP</option>
                    <option value="gold">رتبة Gold</option>
                    <option value="mythic">رتبة Mythic</option>
                    <option value="rx">رتبة RX الأسطورية</option>
                </select>
                <button class="btn-action btn-primary" onclick="sendToPlugin('rank')">تفعيل الرتبة للاعب</button>
            </div>

            <!-- العقوبات والإشراف -->
            <div class="control-card">
                <h3><i class="fa-solid fa-gavel"></i> الإشراف والعقوبات</h3>
                <input type="text" id="punishPlayer" placeholder="اسم اللاعب">
                <select id="punishAction">
                    <option value="ban">حظر نهائي (Ban)</option>
                    <option value="kick">طرد من السيرفر (Kick)</option>
                    <option value="pardon">إلغاء الحظر (Unban)</option>
                </select>
                <button class="btn-action btn-danger" onclick="sendToPlugin('punish')">تنفيذ العقوبة فوراً</button>
            </div>

            <!-- الشات العام -->
            <div class="control-card" style="grid-column: span 2;">
                <h3><i class="fa-solid fa-comment-dots"></i> البث والشات العام داخل السيرفر</h3>
                <div style="display: flex; gap: 1rem; margin: 0;">
                    <input type="text" id="sayMessage" placeholder="اكتب رسالة الإعلان العامة هنا..." style="margin: 0;">
                    <button class="btn-action btn-primary" onclick="sendToPlugin('say')" style="width: auto; padding: 0 2rem;">إرسال المذيع</button>
                </div>
            </div>

            <!-- شاشة الكونسول المباشرة داخل الصفحة -->
            <div class="console-box" id="consoleBox">
                <div class="console-line">[System] Web API Console initialized. Connecting to ACLClouds node...</div>
            </div>
        </div>
    </div>

    <script>
        // رابط استضافة ACLClouds الخاص بك والموجه لبلجن Recon مباشرة
        const SERVER_API_URL = "http://rxsmp-c5315cf5.game-nodes68.aclclouds.online:30091/api/command"; 

        if (sessionStorage.getItem('isAdmin') === 'true') { showPanel(); }

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === "panel" && pass === "mstro159") {
                sessionStorage.setItem('isAdmin', 'true');
                showPanel();
            } else { alert('🚨 البيانات خاطئة!'); }
        }

        function showPanel() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('panelBox').style.display = 'block';
            document.body.style.alignItems = 'flex-start';
            document.body.style.padding = '4rem 2rem';
        }

        function logout() { sessionStorage.clear(); window.location.reload(); }

        function logToConsole(command, responseText) {
            const consoleBox = document.getElementById('consoleBox');
            const time = new Date().toLocaleTimeString();
            consoleBox.innerHTML += `<div class="console-line cmd">[${time}] > Sending: ${command}</div>`;
            consoleBox.innerHTML += `<div class="console-line">[${time}] Reply: ${responseText}</div>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        async function sendToPlugin(type) {
            let commandText = "";

            if (type === 'rank') {
                const player = document.getElementById('rankPlayer').value.trim();
                const rank = document.getElementById('rankSelect').value;
                if (!player) return alert("أدخل اسم اللاعب");
                commandText = `lp user ${player} parent set ${rank}`;
                document.getElementById('rankPlayer').value = "";
            } else if (type === 'punish') {
                const player = document.getElementById('punishPlayer').value.trim();
                const action = document.getElementById('punishAction').value;
                if (!player) return alert("أدخل اسم اللاعب");
                commandText = `${action} ${player}`;
                document.getElementById('punishPlayer').value = "";
            } else if (type === 'say') {
                const msg = document.getElementById('sayMessage').value.trim();
                if (!msg) return alert("أدخل الرسالة");
                commandText = `say ${msg}`;
                document.getElementById('sayMessage').value = "";
            }

            try {
                const response = await fetch(SERVER_API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('panel:mstro159') 
                    },
                    body: JSON.stringify({ command: commandText })
                });
                
                const data = await response.json();
                logToConsole(commandText, data.output || "Done (No output from console).");
            } catch (err) {
                logToConsole(commandText, "فشل الاتصال! تأكد من أن السيرفر شغال على ACLClouds وأن منفذ البلجن مضبوط على 30091.");
            }
        }
    </script>
</body>
</html>
